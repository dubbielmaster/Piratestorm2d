<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0d2b45;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* UI y Controles Táctiles */
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
        }
        .control-zone {
            position: absolute;
            bottom: 0;
            width: 50%;
            height: 50%;
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        #joystick-base {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: none;
            transform: translate(-50%, -50%);
        }
        #joystick-stick {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            top: 30px;
            left: 30px;
        }
        #fire-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff5555, #990000);
            border: 3px solid #fff;
            color: white;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            active: background: #cc0000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI -->
    <div class="hud">
        🚢 Vida: <span id="hp-display">100</span>%<br>
        🪙 Oro: <span id="gold-display">0</span><br>
        ☠️ Enemigos hundidos: <span id="score-display">0</span>
    </div>

    <!-- Zonas de Control -->
    <div id="left-zone" class="control-zone"></div>
    <div id="right-zone" class="control-zone">
        <div id="fire-btn">¡FUEGO!</div>
    </div>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- ESTADO DEL JUEGO ---
let player = {
    x: 0,
    y: 0,
    angle: 0,
    speed: 0,
    maxSpeed: 3,
    hp: 100,
    maxHp: 100,
    gold: 0,
    score: 0,
    fireCooldown: 0
};

let enemies = [];
let cannonballs = [];
let particles = [];
let joystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, angle: 0, distance: 0 };

player.x = canvas.width / 2;
player.y = canvas.height / 2;

// Generar enemigos iniciales
for (let i = 0; i < 4; i++) {
    spawnEnemy();
}

function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 400;
    enemies.push({
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        angle: 0,
        hp: 40,
        maxHp: 40,
        fireCooldown: 0
    });
}

// --- CONTROLES TÁCTILES ---
const leftZone = document.getElementById('left-zone');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');
const fireBtn = document.getElementById('fire-btn');

leftZone.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;

    joyBase.style.left = `${touch.clientX}px`;
    joyBase.style.top = `${touch.clientY}px`;
    joyBase.style.display = 'block';
});

leftZone.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    const touch = e.touches[0];
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;

    const dx = joystick.currentX - joystick.startX;
    const dy = joystick.currentY - joystick.startY;
    const dist = Math.min(Math.hypot(dx, dy), 40);
    const angle = Math.atan2(dy, dx);

    joystick.angle = angle;
    joystick.distance = dist / 40; // 0 a 1

    joyStick.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
});

const endJoystick = () => {
    joystick.active = false;
    joystick.distance = 0;
    joyBase.style.display = 'none';
};
leftZone.addEventListener('touchend', endJoystick);
leftZone.addEventListener('touchcancel', endJoystick);

fireBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    shootCannonballs(player, true);
});

// Soporte para probar con Teclado en PC
let keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// --- MECÁNICAS DE DISPARO ---
function shootCannonballs(ship, isPlayer) {
    if (ship.fireCooldown > 0) return;

    // Dispara por ambos costados (estilo nave/barco)
    [-Math.PI / 2, Math.PI / 2].forEach(sideAngle => {
        const angle = ship.angle + sideAngle;
        cannonballs.push({
            x: ship.x,
            y: ship.y,
            vx: Math.cos(angle) * 6,
            vy: Math.sin(angle) * 6,
            life: 40,
            isPlayer: isPlayer
        });
    });

    ship.fireCooldown = 25; // Tiempo entre ráfagas
}

// --- BUCLE PRINCIPAL (GAME LOOP) ---
function update() {
    // Cooldowns
    if (player.fireCooldown > 0) player.fireCooldown--;

    // Movimiento Jugador (Joystick táctil)
    if (joystick.active && joystick.distance > 0.1) {
        player.angle = joystick.angle;
        player.speed = player.maxSpeed * joystick.distance;
    } else {
        // Movimiento Teclado PC (alternativa)
        if (keys['ArrowUp'] || keys['w']) player.speed = player.maxSpeed;
        else player.speed *= 0.95; // Fricción del agua

        if (keys['ArrowLeft'] || keys['a']) player.angle -= 0.05;
        if (keys['ArrowRight'] || keys['d']) player.angle += 0.05;
        if (keys[' ']) shootCannonballs(player, true);
    }

    player.x += Math.cos(player.angle) * player.speed;
    player.y += Math.sin(player.angle) * player.speed;

    // Mover balas
    for (let i = cannonballs.length - 1; i >= 0; i--) {
        let b = cannonballs[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        // Colisión Bala con Enemigo
        if (b.isPlayer) {
            enemies.forEach(e => {
                if (Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                    e.hp -= 15;
                    b.life = 0;
                    createExplosion(b.x, b.y, '#ffaa00');
                }
            });
        } else {
            // Colisión Bala Enemiga con Jugador
            if (Math.hypot(player.x - b.x, player.y - b.y) < 20) {
                player.hp = Math.max(0, player.hp - 10);
                b.life = 0;
                createExplosion(b.x, b.y, '#ff4444');
                document.getElementById('hp-display').innerText = player.hp;
            }
        }

        if (b.life <= 0) cannonballs.splice(i, 1);
    }

    // Actualizar IA de Enemigos
    enemies.forEach((e, index) => {
        if (e.fireCooldown > 0) e.fireCooldown--;

        const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
        e.angle = Math.atan2(player.y - e.y, player.x - e.x);

        // Persecución si está lejos, orbita/dispara si está cerca
        if (distToPlayer > 120) {
            e.x += Math.cos(e.angle) * 1.5;
            e.y += Math.sin(e.angle) * 1.5;
        } else if (distToPlayer < 250) {
            shootCannonballs(e, false);
        }

        // Muerte del enemigo
        if (e.hp <= 0) {
            createExplosion(e.x, e.y, '#ff5500', 15);
            player.gold += 25;
            player.score++;
            document.getElementById('gold-display').innerText = player.gold;
            document.getElementById('score-display').innerText = player.score;
            enemies.splice(index, 1);
            setTimeout(spawnEnemy, 3000); // Reaparece en 3 segundos
        }
    });

    // Partículas
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

function createExplosion(x, y, color, count = 6) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 4,
            vy: (Math.random() - 0.5) * 4,
            alpha: 1, color: color
        });
    }
}

// --- RENDERIZADO (DIBUJO) ---
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Guardar cámara centrada en el jugador
    ctx.save();
    ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

    // Fondo (Cuadrícula del Océano)
    ctx.strokeStyle = '#133a5d';
    ctx.lineWidth = 2;
    const gridSize = 100;
    const startX = Math.floor((player.x - canvas.width) / gridSize) * gridSize;
    const endX = Math.floor((player.x + canvas.width) / gridSize) * gridSize;
    const startY = Math.floor((player.y - canvas.height) / gridSize) * gridSize;
    const endY = Math.floor((player.y + canvas.height) / gridSize) * gridSize;

    for (let x = startX; x < endX; x += gridSize) {
        for (let y = startY; y < endY; y += gridSize) {
            ctx.strokeRect(x, y, gridSize, gridSize);
        }
    }

    // Dibujar Partículas
    particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Dibujar Balas
    ctx.fillStyle = '#000';
    cannonballs.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    // Dibujar Enemigos
    enemies.forEach(e => drawShip(e.x, e.y, e.angle, '#d9534f', e.hp, e.maxHp));

    // Dibujar Barco del Jugador
    drawShip(player.x, player.y, player.angle, '#5cb85c', player.hp, player.maxHp);

    ctx.restore();
}

function drawShip(x, y, angle, color, hp, maxHp) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Casco del barco
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(-12, -10);
    ctx.lineTo(-12, 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Detalle de velas
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, -8, 4, 16);

    ctx.restore();

    // Barra de Vida
    if (hp < maxHp) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(x - 15, y - 22, 30, 5);
        ctx.fillStyle = color;
        ctx.fillRect(x - 15, y - 22, (hp / maxHp) * 30, 5);
    }
}

// Bucle principal
function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
