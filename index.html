<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - v0.01</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffffff;
            font-family: Arial, sans-serif;
            pointer-events: none;
        }

        #version {
            font-size: 12px;
            color: #ffd700;
            font-weight: bold;
            text-transform: uppercase;
        }

        #instructions {
            font-size: 14px;
            margin-top: 5px;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="version">v0.01 - Motor Unificado</div>
        <div id="instructions">Toca el agua para navegar</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // -------------------------------------------------------------
        // 1. CLASE OCÉANO
        // -------------------------------------------------------------
        class Ocean {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.waveOffset = 0;
            }

            update() {
                this.waveOffset += 0.03;
            }

            draw() {
                // Fondo Turquesa estilo Pirate Storm
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, "#00b4d8");
                gradient.addColorStop(1, "#0077b6");
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Ondas del agua
                this.ctx.strokeStyle = "rgba(255, 255, 255, 0.25)";
                this.ctx.lineWidth = 2;

                for (let i = 0; i < this.canvas.height; i += 40) {
                    this.ctx.beginPath();
                    for (let x = 0; x < this.canvas.width; x += 30) {
                        const y = i + Math.sin(x * 0.02 + this.waveOffset + i) * 4;
                        if (x === 0) this.ctx.moveTo(x, y);
                        else this.ctx.lineTo(x, y);
                    }
                    this.ctx.stroke();
                }
            }
        }

        // -------------------------------------------------------------
        // 2. CLASE JUGADOR (BARCO)
        // -------------------------------------------------------------
        class PlayerShip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.speed = 2.5;
                this.angle = 0;
            }

            moveTo(targetX, targetY) {
                this.targetX = targetX;
                this.targetY = targetY;
            }

            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 5) {
                    this.angle = Math.atan2(dy, dx);
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Casco de madera
                ctx.fillStyle = "#5c3d11";
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-15, -10);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, 10);
                ctx.closePath();
                ctx.fill();

                // Velas
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(-5, -8, 4, 16);

                ctx.restore();
            }
        }

        // -------------------------------------------------------------
        // 3. INICIALIZACIÓN Y BUCLE PRINCIPAL
        // -------------------------------------------------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ocean = new Ocean(canvas);
        const player = new PlayerShip(canvas.width / 2, canvas.height / 2);

        // Controles Táctiles
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            player.moveTo(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            player.moveTo(touch.clientX, touch.clientY);
        });

        // Loop del juego
        function gameLoop() {
            ocean.update();
            player.update();

            ocean.draw();
            player.draw(ctx);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
