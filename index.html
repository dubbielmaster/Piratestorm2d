<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - v0.03</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #ffffff; font-family: Arial, sans-serif; pointer-events: none; }
        #version { font-size: 12px; color: #ffd700; font-weight: bold; text-transform: uppercase; }
        #stats { font-size: 13px; margin-top: 5px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="version">v0.03 - Target & Puerto Isométrico</div>
        <div id="stats">Toca el agua para moverte | Toca un enemigo para fijar objetivo</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // CONFIGURACIÓN DE CAÑONES
        const CANNON_CONFIG = {
            damage: 20,
            range: 300,
            fireRate: 500,
            bulletSpeed: 8
        };

        // 1. OCÉANO
        class Ocean {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.time = 0;
            }

            update() { this.time += 0.005; }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                const gradient = ctx.createLinearGradient(0, 0, 0, h);
                gradient.addColorStop(0, "#00c3e3");
                gradient.addColorStop(1, "#0084a8");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineWidth = 1;

                const layers = [
                    { freqX: 0.01, freqY: 0.01, speed: 1.0, opacity: 0.15, scaleY: 15 },
                    { freqX: 0.02, freqY: 0.005, speed: -0.8, opacity: 0.10, scaleY: 10 }
                ];

                layers.forEach(layer => {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${layer.opacity})`;
                    for (let yBase = -50; yBase < h + 50; yBase += 15) {
                        ctx.beginPath();
                        for (let x = 0; x < w + 20; x += 10) {
                            const movement = this.time * layer.speed;
                            const waveX = Math.sin(x * layer.freqX + movement);
                            const waveY = Math.cos((yBase + x*0.1) * layer.freqY + movement * 0.5);
                            const yOutput = yBase + (waveX * waveY) * layer.scaleY;

                            if (x === 0) ctx.moveTo(x, yOutput);
                            else ctx.lineTo(x, yOutput);
                        }
                        ctx.stroke();
                    }
                });
                ctx.restore();
            }
        }

        // 2. PUERTO E ISLA (Estructura isométrica 3D Prerrenderizada)
        class Port {
            draw(ctx) {
                ctx.save();
                
                // Arena / Costa de la Isla
                ctx.fillStyle = "#e0cda3";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(220, 0);
                ctx.lineTo(170, 100);
                ctx.lineTo(100, 160);
                ctx.lineTo(0, 180);
                ctx.closePath();
                ctx.fill();

                // Vegetación / Tierra
                ctx.fillStyle = "#2d6a4f";
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(180, 0);
                ctx.lineTo(130, 80);
                ctx.lineTo(70, 120);
                ctx.lineTo(0, 140);
                ctx.closePath();
                ctx.fill();

                // Muelle de Piedra (Vista isométrica)
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(80, 100, 70, 15); // Brazo muelle
                ctx.fillRect(140, 100, 15, 40);

                // Edificios del Puerto (Efecto 3D simple)
                // Casa 1
                ctx.fillStyle = "#a84227"; // Techo
                ctx.fillRect(30, 30, 35, 25);
                ctx.fillStyle = "#d5bdaf"; // Pared
                ctx.fillRect(30, 55, 35, 15);

                // Casa 2
                ctx.fillStyle = "#3a5a40"; // Techo
                ctx.fillRect(85, 20, 40, 30);
                ctx.fillStyle = "#e9ecef"; // Pared
                ctx.fillRect(85, 50, 40, 18);

                // Torre de defensa
                ctx.fillStyle = "#495057";
                ctx.beginPath();
                ctx.arc(145, 120, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 3. BALA DE CAÑÓN
        class CannonBall {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.startX = startX;
                this.startY = startY;
                
                const angle = Math.atan2(targetY - startY, targetX - startX);
                this.vx = Math.cos(angle) * CANNON_CONFIG.bulletSpeed;
                this.vy = Math.sin(angle) * CANNON_CONFIG.bulletSpeed;
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (Math.hypot(this.x - this.startX, this.y - this.startY) > CANNON_CONFIG.range) {
                    this.active = false;
                }
            }

            draw(ctx) {
                ctx.fillStyle = "#111111";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 4. ENEMIGO
        class Enemy {
            constructor(id, x, y) {
                this.id = id;
                this.x = x;
                this.y = y;
                this.maxHp = 100;
                this.hp = 100;
                this.radius = 22;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.6;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Evitar entrar al puerto
                if (this.x < 180 && this.y < 180) {
                    this.angle += Math.PI / 2;
                }

                if (Math.random() < 0.02) {
                    this.angle += (Math.random() - 0.5);
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                return this.hp <= 0;
            }

            respawn() {
                this.x = Math.random() * (window.innerWidth - 150) + 100;
                this.y = Math.random() * (window.innerHeight - 250) + 200;
                this.hp = this.maxHp;
            }

            draw(ctx, isTarget) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Si es el OBJETIVO SELECCIONADO (Unitarget), dibujamos el retículo
                if (isTarget) {
                    ctx.strokeStyle = "#ff0000";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 8, 0, Math.PI * 2);
                    ctx.stroke();

                    // Cruz del objetivo
                    ctx.beginPath();
                    ctx.moveTo(-this.radius - 12, 0); ctx.lineTo(-this.radius - 4, 0);
                    ctx.moveTo(this.radius + 4, 0); ctx.lineTo(this.radius + 12, 0);
                    ctx.moveTo(0, -this.radius - 12); ctx.lineTo(0, -this.radius - 4);
                    ctx.moveTo(0, this.radius + 4); ctx.lineTo(0, this.radius + 12);
                    ctx.stroke();
                }

                // Cuerpo del Monstruo/Enemigo
                ctx.fillStyle = "#8b0000";
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#ff4500";
                ctx.beginPath();
                ctx.arc(0, 0, this.radius - 6, 0, Math.PI * 2);
                ctx.fill();

                // Barra de Vida
                const barWidth = 32;
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(-barWidth/2, -this.radius - 12, barWidth, 4);

                ctx.fillStyle = "#00ff00";
                ctx.fillRect(-barWidth/2, -this.radius - 12, (this.hp / this.maxHp) * barWidth, 4);

                ctx.restore();
            }
        }

        // 5. BARCO DEL JUGADOR
        class PlayerShip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.speed = 2.0;
                this.angle = 0;
                this.lastShot = 0;
                this.selectedEnemy = null; // Guardará el enemigo fijado
            }

            moveTo(targetX, targetY) {
                this.targetX = targetX;
                this.targetY = targetY;
            }

            update(bulletsArray) {
                // Movimiento
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.hypot(dx, dy);

                if (distance > 5) {
                    this.angle = Math.atan2(dy, dx);
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }

                // Sistema AUTO-DISPARO UNITARGET
                if (this.selectedEnemy) {
                    const distToEnemy = Math.hypot(this.selectedEnemy.x - this.x, this.selectedEnemy.y - this.y);
                    
                    // Disparar automáticamente si está dentro del alcance
                    if (distToEnemy <= CANNON_CONFIG.range) {
                        const now = Date.now();
                        if (now - this.lastShot >= CANNON_CONFIG.fireRate) {
                            bulletsArray.push(new CannonBall(this.x, this.y, this.selectedEnemy.x, this.selectedEnemy.y));
                            this.lastShot = now;
                        }
                    }
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Casco del Barco
                ctx.fillStyle = "#5c3d11";
                ctx.beginPath();
                ctx.moveTo(22, 0);
                ctx.lineTo(-15, -12);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, 12);
                ctx.closePath();
                ctx.fill();

                // Cañones
                ctx.fillStyle = "#111111";
                ctx.fillRect(-2, -14, 4, 3);
                ctx.fillRect(-2, 11, 4, 3);

                // Velas
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(-5, -9, 5, 18);

                ctx.restore();
            }
        }

        // 6. INICIALIZACIÓN
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ocean = new Ocean(canvas);
        const port = new Port();
        const player = new PlayerShip(canvas.width / 2, canvas.height / 2);
        const bullets = [];
        const enemies = [
            new Enemy(1, canvas.width - 80, 220),
            new Enemy(2, canvas.width / 2, canvas.height - 120)
        ];

        // CONTROLES TÁCTILES UNITARGET
        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;

            // Verificar si tocó a un enemigo
            let clickedEnemy = null;
            enemies.forEach(enemy => {
                if (Math.hypot(touchX - enemy.x, touchY - enemy.y) < enemy.radius + 15) {
                    clickedEnemy = enemy;
                }
            });

            if (clickedEnemy) {
                // Si tocó a un enemigo, lo fijamos como objetivo
                player.selectedEnemy = clickedEnemy;
            } else {
                // Si tocó el agua, se mueve hacia allá
                player.moveTo(touchX, touchY);
            }
        }

        canvas.addEventListener('touchstart', handleTouch, {passive: false});

        // BUCLE PRINCIPAL
        function gameLoop() {
            ocean.update();
            player.update(bullets);

            // Actualizar Enemigos
            enemies.forEach(enemy => enemy.update());

            // Actualizar y Procesar Balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.update();

                enemies.forEach(enemy => {
                    if (Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y) < enemy.radius) {
                        const dead = enemy.takeDamage(CANNON_CONFIG.damage);
                        bullet.active = false;
                        
                        if (dead) {
                            if (player.selectedEnemy === enemy) player.selectedEnemy = null;
                            enemy.respawn();
                        }
                    }
                });

                if (!bullet.active) bullets.splice(i, 1);
            }

            // RENDERIZADO
            ocean.draw();
            port.draw(ctx); // Renderizar puerto e isla
            
            enemies.forEach(enemy => {
                const isTarget = (player.selectedEnemy === enemy);
                enemy.draw(ctx, isTarget);
            });

            bullets.forEach(bullet => bullet.draw(ctx));
            player.draw(ctx);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
