<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pirate Storm 2D</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#00131f;
}

canvas{
    display:block;
}

#info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:18px;
    text-shadow:2px 2px 4px black;
}
</style>

</head>
<body>

<div id="info">
🌊 Pirate Storm 2D Alpha
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.onresize=resize;
resize();

let wave=0;

const ship={
x:canvas.width/2,
y:canvas.height/2,
angle:0,
speed:3,
targetX:canvas.width/2,
targetY:canvas.height/2
};

const stars=[];

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
a:Math.random(),
dir:Math.random()>0.5?1:-1

});

}

function drawOcean(){

const g=ctx.createLinearGradient(0,0,0,canvas.height);

g.addColorStop(0,"#22c7ff");
g.addColorStop(.5,"#0099dd");
g.addColorStop(1,"#006699");

ctx.fillStyle=g;

ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="rgba(255,255,255,.12)";
ctx.lineWidth=2;

for(let y=0;y<canvas.height+40;y+=35){

ctx.beginPath();

for(let x=0;x<canvas.width+30;x+=25){

let yy=y+Math.sin((x*.02)+wave+y*.05)*5;

if(x==0)
ctx.moveTo(x,yy);
else
ctx.lineTo(x,yy);

}

ctx.stroke();

}

}

function drawSparkles(){

for(const s of stars){

s.a+=0.01*s.dir;

if(s.a>1){
s.dir=-1;
}

if(s.a<0){
s.dir=1;
}

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fillStyle="rgba(255,255,255,"+(s.a*.4)+")";

ctx.fill();

}

}

function drawShip(){

ctx.save();

ctx.translate(ship.x,ship.y);

ctx.rotate(ship.angle);

ctx.strokeStyle="rgba(255,255,255,.25)";
ctx.lineWidth=4;

ctx.beginPath();
ctx.moveTo(-45,0);
ctx.lineTo(-15,0);
ctx.stroke();

ctx.fillStyle="#5e3814";

ctx.beginPath();
ctx.moveTo(25,0);
ctx.lineTo(-18,-12);
ctx.lineTo(-8,0);
ctx.lineTo(-18,12);
ctx.closePath();
ctx.fill();

ctx.fillStyle="#d2b48c";

ctx.fillRect(-2,-15,4,30);

ctx.fillStyle="white";

ctx.beginPath();
ctx.moveTo(2,-14);
ctx.lineTo(18,0);
ctx.lineTo(2,14);
ctx.closePath();
ctx.fill();

ctx.restore();

}

function update(){

wave+=0.015;

let dx=ship.targetX-ship.x;
let dy=ship.targetY-ship.y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist>3){

ship.angle=Math.atan2(dy,dx);

ship.x+=Math.cos(ship.angle)*ship.speed;

ship.y+=Math.sin(ship.angle)*ship.speed;

}

}

function render(){

update();

drawOcean();

drawSparkles();

drawShip();

requestAnimationFrame(render);

}

canvas.addEventListener("touchstart",e=>{

let t=e.touches[0];

ship.targetX=t.clientX;
ship.targetY=t.clientY;

});

canvas.addEventListener("touchmove",e=>{

let t=e.touches[0];

ship.targetX=t.clientX;
ship.targetY=t.clientY;

});

render();

</script>

</body>
</html>
