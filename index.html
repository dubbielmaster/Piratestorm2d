<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - v0.01.1</title>
    <style>
        /* (Mismo CSS de antes, no ha cambiado) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #ffffff; font-family: Arial, sans-serif; pointer-events: none; }
        #version { font-size: 12px; color: #ffd700; font-weight: bold; text-transform: uppercase; }
        #instructions { font-size: 14px; margin-top: 5px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="version">v0.01.1 - Oleaje Mejorado</div>
        <div id="instructions">Toca el agua para navegar</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // =============================================================
        // 1. CLASE OCÉANO ACTUALIZADA (Estilo Pirate Storm)
        // =============================================================
        class Ocean {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.time = 0;
            }

            update() {
                this.time += 0.005; // Velocidad general de la animación
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                // A) FONDO: Gradiente base (El color que te gustó)
                const gradient = ctx.createLinearGradient(0, 0, 0, h);
                gradient.addColorStop(0, "#00c3e3"); // Turquesa claro arriba
                gradient.addColorStop(1, "#0084a8"); // Azul más profundo abajo
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);

                // B) ONDAS COMPLEJAS: Superposición de patrones
                ctx.save();
                
                // Efecto de brillo de agua suave
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineWidth = 1;

                // Definimos varios patrones de ondas que se cruzan
                const layers = [
                    { freqX: 0.01, freqY: 0.01, speed: 1.0, opacity: 0.15, scaleY: 15 },
                    { freqX: 0.02, freqY: 0.005, speed: -0.8, opacity: 0.10, scaleY: 10 },
                    { freqX: 0.005, freqY: 0.02, speed: 1.5, opacity: 0.08, scaleY: 20 }
                ];

                layers.forEach(layer => {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${layer.opacity})`;
                    
                    // Densidad de líneas (menos separación para parecer textura)
                    const step = 15; 

                    for (let yBase = -50; yBase < h + 50; yBase += step) {
                        ctx.beginPath();
                        
                        for (let x = 0; x < w + 20; x += 10) {
                            // Cálculo matemático para ondas que se mueven en X e Y
                            const movement = this.time * layer.speed;
                            
                            // La magia: Seno de (X + tiempo) * Seno de (Y + tiempo) crea interferencia
                            const waveX = Math.sin(x * layer.freqX + movement);
                            const waveY = Math.cos((yBase + x*0.1) * layer.freqY + movement * 0.5);
                            
                            // Combinamos para obtener el desplazamiento vertical final
                            const yOutput = yBase + (waveX * waveY) * layer.scaleY;

                            if (x === 0) ctx.moveTo(x, yOutput);
                            else ctx.lineTo(x, yOutput);
                        }
                        ctx.stroke();
                    }
                });

                ctx.restore();
            }
        }

        // =============================================================
        // 2. CLASE JUGADOR (BARCO - Mismo de antes)
        // =============================================================
        class PlayerShip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.speed = 2.0; // Un poco más lento para mejor control en móvil
                this.angle = 0;
            }

            moveTo(targetX, targetY) {
                this.targetX = targetX;
                this.targetY = targetY;
            }

            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 5) {
                    this.angle = Math.atan2(dy, dx);
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Casco
                ctx.fillStyle = "#5c3d11";
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-15, -10);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, 10);
                ctx.closePath();
                ctx.fill();

                // Velas
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(-5, -8, 4, 16);

                ctx.restore();
            }
        }

        // =============================================================
        // 3. INICIALIZACIÓN Y BUCLE PRINCIPAL (Mismo de antes)
        // =============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ocean = new Ocean(canvas);
        const player = new PlayerShip(canvas.width / 2, canvas.height / 2);

        // Controles Táctiles Mejorados para móvil
        function handleTouch(e) {
            e.preventDefault(); // Previene scroll accidental
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            // Ajuste por si el canvas no ocupa toda la pantalla
            player.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
        }

        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});

        // Loop del juego
        function gameLoop() {
            ocean.update();
            player.update();

            // Limpiar canvas no es necesario si el océano cubre todo, 
            // pero es buena práctica para evitar rastros.
            // ctx.clearRect(0, 0, canvas.width, canvas.height); 

            ocean.draw();
            player.draw(ctx);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
