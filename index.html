<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - v0.05</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; }
        #game-container { width: 100vw; height: 100vh; }
        
        /* Interfaz UI Móvil superior y botones */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: none; z-index: 10;
        }
        .hud-box {
            background: rgba(0,0,0,0.7); color: #fff; padding: 8px 12px;
            border-radius: 8px; border: 1px solid #ffd700; font-size: 12px;
        }
        #controls-panel {
            position: absolute; bottom: 15px; right: 15px;
            display: flex; gap: 10px; z-index: 10;
        }
        .btn-game {
            background: #d90429; color: white; border: 2px solid #fff;
            padding: 12px 16px; border-radius: 50%; font-weight: bold;
            font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .btn-game:active { transform: scale(0.95); background: #ef233c; }

        /* Ventana emergente (Subasta / Puerto / Mejoras) */
        #modal {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 85%; max-width: 400px;
            background: #1d2d44; color: white; border: 2px solid #ffd700;
            border-radius: 12px; padding: 15px; z-index: 20; box-shadow: 0 0 20px #000;
        }
        #modal h2 { color: #ffd700; margin-bottom: 10px; font-size: 18px; text-align: center; }
        .modal-item { display: flex; justify-content: space-between; margin: 8px 0; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 6px; }
        .close-btn { background: #778da9; color: white; border: none; padding: 6px 12px; border-radius: 4px; float: right; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

    <div id="hud">
        <div class="hud-box" id="player-stats">
            <b>Barco:</b> Balsa de Madera<br>
            <b>Nivel:</b> 1 | <b>Oro:</b> <span id="gold-val">1000</span>
        </div>
        <div class="hud-box" id="map-info">
            <b>Mapa 1:</b> Bahía del Inicio
        </div>
    </div>

    <div id="controls-panel">
        <button class="btn-game" style="background:#2a9d8f;" onclick="openModal('puerto')">⛵ Puerto</button>
        <button class="btn-game" style="background:#e76f51;" onclick="openModal('subasta')">⚖️ Subasta</button>
    </div>

    <!-- Ventana Modal de Puerto y Subastas -->
    <div id="modal">
        <button class="close-btn" onclick="closeModal()">X</button>
        <h2 id="modal-title">Puerto</h2>
        <div id="modal-content"></div>
    </div>

    <div id="game-container"></div>

    <script>
        // =============================================================
        // 1. BASE DE DATOS DEL JUEGO
        // =============================================================
        const SHIPS_DB = [
            { id: 1, name: "Balsa de Madera", hp: 100, speed: 100, price: 0 },
            { id: 2, name: "Sloop de Caza", hp: 250, speed: 120, price: 500 },
            { id: 3, name: "Carabela Mercante", hp: 500, speed: 110, price: 1200 },
            { id: 4, name: "Bergantín Filibustero", hp: 900, speed: 130, price: 2500 },
            { id: 5, name: "Goleta de Guerra", hp: 1500, speed: 140, price: 5000 },
            { id: 6, name: "Fragata de Asalto", hp: 2300, speed: 125, price: 10000 },
            { id: 7, name: "Galeón Real", hp: 3500, speed: 115, price: 20000 },
            { id: 8, name: "Acorazado del Abismo", hp: 5000, speed: 110, price: 40000 },
            { id: 9, name: "Leviatán de Acero", hp: 7500, speed: 120, price: 80000 },
            { id: 10, name: "Señor de las Tormentas", hp: 12000, speed: 135, price: 150000 }
        ];

        const MAPS_DB = [
            "Bahía del Inicio", "Arrecife Tormentoso", "Isla de los Esqueletos",
            "Mar del Abismo", "Costa de los Piratas", "Cueva del Leviatán",
            "Furia Volcánica", "Océano Helado", "Foso de las Sirenas", "Santuario del Señor"
        ];

        // Estado Global del Jugador
        window.playerState = {
            gold: 1000,
            level: 1,
            shipIndex: 0,
            currentMap: 0,
            upgrades: { proa: 1, quilla: 1, cubierta: 1, velas: 1 }
        };

        // =============================================================
        // 2. MOTOR DEL JUEGO (Phaser 3)
        // =============================================================
        class GameScene extends Phaser.Scene {
            constructor() { super({ key: 'GameScene' }); }

            create() {
                // Fondo Agua
                this.add.rectangle(0, 0, 4000, 4000, 0x0096c7).setOrigin(0);

                // Jugador
                this.player = this.add.container(400, 300);
                const hull = this.add.triangle(0, 0, 0, -22, -12, 15, 12, 15, 0x5c3d11);
                const sail = this.add.rectangle(0, 0, 5, 18, 0xffffff);
                this.player.add([hull, sail]);
                this.physics.world.enable(this.player);

                // Monstruo Marino (Enemigo Unitarget)
                this.enemy = this.add.container(600, 350);
                const monster = this.add.circle(0, 0, 20, 0x8b0000);
                this.enemy.add(monster);
                this.enemy.setInteractive(new Phaser.Geom.Circle(0, 0, 25), Phaser.Geom.Circle.Contains);

                this.reticle = this.add.graphics();
                this.selectedEnemy = null;

                // Seleccionar Enemigo
                this.enemy.on('pointerdown', (pointer, x, y, event) => {
                    event.stopPropagation();
                    this.selectedEnemy = this.enemy;
                });

                // Moverse al tocar el agua
                this.input.on('pointerdown', (pointer) => {
                    this.selectedEnemy = null;
                    const speed = SHIPS_DB[window.playerState.shipIndex].speed;
                    this.physics.moveTo(this.player, pointer.worldX, pointer.worldY, speed);
                    const angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, pointer.worldX, pointer.worldY);
                    this.player.setRotation(angle + Math.PI / 2);
                });
            }

            update() {
                this.reticle.clear();
                if (this.selectedEnemy) {
                    this.reticle.lineStyle(2, 0xff0000);
                    this.reticle.strokeCircle(this.selectedEnemy.x, this.selectedEnemy.y, 30);
                }
            }
        }

        // =============================================================
        // 3. FUNCIONES DE INTERFAZ Y MODALES
        // =============================================================
        function openModal(type) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            modal.style.display = 'block';

            if (type === 'puerto') {
                title.innerText = "Puerto y Mejoras de Barco";
                content.innerHTML = `
                    <div class="modal-item"><span>Proa (Nivel ${window.playerState.upgrades.proa})</span> <button onclick="upgradePart('proa')">Mejorar (200 Oro)</button></div>
                    <div class="modal-item"><span>Quilla (Nivel ${window.playerState.upgrades.quilla})</span> <button onclick="upgradePart('quilla')">Mejorar (200 Oro)</button></div>
                    <div class="modal-item"><span>Cubierta (Nivel ${window.playerState.upgrades.cubierta})</span> <button onclick="upgradePart('cubierta')">Mejorar (200 Oro)</button></div>
                    <div class="modal-item"><span>Velas (Nivel ${window.playerState.upgrades.velas})</span> <button onclick="upgradePart('velas')">Mejorar (200 Oro)</button></div>
                `;
            } else if (type === 'subasta') {
                title.innerText = "Subasta de Barcos (10 Barcos)";
                let html = "";
                SHIPS_DB.forEach((ship, index) => {
                    html += `<div class="modal-item">
                        <span><b>${ship.name}</b> (${ship.hp} HP)</span>
                        <button onclick="buyShip(${index})">${window.playerState.shipIndex === index ? 'Equipado' : ship.price + ' Oro'}</button>
                    </div>`;
                });
                content.innerHTML = html;
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function buyShip(index) {
            const ship = SHIPS_DB[index];
            if (window.playerState.gold >= ship.price) {
                window.playerState.gold -= ship.price;
                window.playerState.shipIndex = index;
                updateHUD();
                openModal('subasta');
            } else {
                alert("¡No tienes suficiente oro!");
            }
        }

        function upgradePart(part) {
            if (window.playerState.gold >= 200) {
                window.playerState.gold -= 200;
                window.playerState.upgrades[part]++;
                updateHUD();
                openModal('puerto');
            } else {
                alert("¡No tienes suficiente oro!");
            }
        }

        function updateHUD() {
            document.getElementById('gold-val').innerText = window.playerState.gold;
            const currentShip = SHIPS_DB[window.playerState.shipIndex];
            document.getElementById('player-stats').innerHTML = `
                <b>Barco:</b> ${currentShip.name}<br>
                <b>Nivel:</b> ${window.playerState.level} | <b>Oro:</b> <span id="gold-val">${window.playerState.gold}</span>
            `;
        }

        // Configuración e inicio de Phaser
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: [GameScene]
        };
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
