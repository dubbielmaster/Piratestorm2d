<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirate Storm 3D Mobile</title>
    <!-- Cargamos Three.js para renderizado 3D Isométrico -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b1d3a;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        #webgl-container {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* UI PIRATE STORM STYLE */
        .hud {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(10, 15, 30, 0.9);
            border: 2px solid #c59b27;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f3e5ab;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            pointer-events: none;
        }
        .hud div { margin-bottom: 3px; }

        .port-indicator {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(212, 175, 55, 0.9);
            color: #111;
            padding: 8px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            display: none;
            box-shadow: 0 0 12px #ffd700;
        }

        /* Modal del Mercado / Puerto */
        #shop-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 380px;
            background: #0f172a;
            border: 3px solid #ffd700;
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            z-index: 100;
        }
        #shop-modal h2 {
            margin-top: 0;
            color: #ffd700;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #334155;
        }
        .shop-item h4 { margin: 0 0 4px 0; color: #facc15; font-size: 13px; }
        .shop-item p { margin: 0; font-size: 11px; color: #94a3b8; }
        .buy-btn {
            background: #10b981;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }
        .buy-btn:disabled { background: #475569; opacity: 0.6; }
        #close-shop {
            width: 100%;
            background: #ef4444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 8px;
        }

        /* Controles */
        .control-zone {
            position: absolute;
            bottom: 0;
            width: 50%;
            height: 50%;
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        #joystick-base {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(212, 175, 55, 0.7);
            display: none;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #joystick-stick {
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700, #b8860b);
            top: 27.5px;
            left: 27.5px;
        }

        #fire-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: radial-gradient(circle, #e63946, #800000);
            border: 3px solid #ffd700;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.7);
            text-transform: uppercase;
        }

        .hp-bar-3d {
            position: absolute;
            width: 40px;
            height: 6px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #000;
            border-radius: 3px;
            pointer-events: none;
            display: none;
        }
        .hp-fill {
            height: 100%;
            background: #4ade80;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="webgl-container"></div>

    <!-- UI HUD -->
    <div class="hud">
        <div>🚢 Barco: <span id="ship-name" style="color: #60a5fa;">Galeón de Combate</span></div>
        <div>❤️ Salud: <span id="hp-display" style="color: #4ade80;">6000/6000</span></div>
        <div>🪙 Oro: <span id="gold-display" style="color: #facc15;">100</span></div>
        <div>⚔️ Cañones: <span id="cannon-level" style="color: #f97316;">Nvl 1 (Daño: 120)</span></div>
    </div>

    <div id="port-tag" class="port-indicator">⚓ Puerto Seguro (Toca para Abrir)</div>

    <!-- Mercado -->
    <div id="shop-modal">
        <h2>⚓ Puerto Pirata</h2>
        <div id="shop-items"></div>
        <button id="close-shop" onclick="toggleShop(false)">VOLVER AL MAR</button>
    </div>

    <!-- Controles -->
    <div id="left-zone" class="control-zone"></div>
    <div id="right-zone" class="control-zone">
        <div id="fire-btn">ATACAR</div>
    </div>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

<script>
// --- CONFIGURACIÓN TRES.JS (3D ISOMÉTRICO) ---
const container = document.getElementById('webgl-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1e36);

// Cámara Isométrica
const aspect = window.innerWidth / window.innerHeight;
const d = 160;
const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
camera.position.set(200, 250, 200);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

// Iluminación
const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff5cc, 0.8);
dirLight.position.set(150, 300, 100);
dirLight.castShadow = true;
scene.add(dirLight);

// Océano 3D
const oceanGeo = new THREE.PlaneGeometry(3000, 3000);
const oceanMat = new THREE.MeshPhongMaterial({ color: 0x114466, shininess: 80 });
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.rotation.x = -Math.PI / 2;
scene.add(ocean);

// --- ESTADO Y JUGADOR ---
let player = {
    mesh: null,
    x: 0,
    z: 0,
    targetX: null,
    targetZ: null,
    angle: 0,
    speed: 0,
    maxSpeed: 1.8,
    hp: 6000,
    maxHp: 6000,
    gold: 100,
    cannonLevel: 1,
    damage: 120,
    range: 180,
    fireCooldown: 0,
    radius: 12
};

let enemies = [];
let cannonballs = [];
let islands = [];
let selectedEnemy = null;
let joystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, angle: 0, distance: 0 };
let inPortZone = false;

// --- CREADOR DE MODELOS 3D ---
function createShipMesh(isDarkSails = true, isMonster = false) {
    const group = new THREE.Group();

    if (isMonster) {
        // Monstruo Marino (Kraken 3D)
        const bodyGeo = new THREE.ConeGeometry(8, 25, 8);
        const mat = new THREE.MeshLambertMaterial({ color: 0x881111 });
        const body = new THREE.Mesh(bodyGeo, mat);
        body.rotation.x = Math.PI / 4;
        group.add(body);
        return group;
    }

    // Casco de Madera del Barco (Estilo imagen de referencia)
    const hullGeo = new THREE.BoxGeometry(14, 10, 32);
    const hullMat = new THREE.MeshStandardMaterial({ color: 0x4a2e18, roughness: 0.6 });
    const hull = new THREE.Mesh(hullGeo, hullMat);
    hull.position.y = 3;
    hull.castShadow = true;
    group.add(hull);

    // Mástiles
    const mastMat = new THREE.MeshLambertMaterial({ color: 0x221105 });
    [-6, 6].forEach(zPos => {
        const mastGeo = new THREE.CylinderGeometry(0.8, 1, 24);
        const mast = new THREE.Mesh(mastGeo, mastMat);
        mast.position.set(0, 14, zPos);
        group.add(mast);

        // Velas Oscuras / Clásicas
        const sailGeo = new THREE.BoxGeometry(0.5, 12, 14);
        const sailMat = new THREE.MeshLambertMaterial({ color: isDarkSails ? 0x222222 : 0xdddddd });
        const sail = new THREE.Mesh(sailGeo, sailMat);
        sail.position.set(0, 15, zPos);
        group.add(sail);
    });

    return group;
}

// Crear Barco Jugador
player.mesh = createShipMesh(true);
scene.add(player.mesh);

// Crear Islas 3D
for (let i = 0; i < 8; i++) {
    const ix = (Math.random() - 0.5) * 1600;
    const iz = (Math.random() - 0.5) * 1600;
    const radius = 35 + Math.random() * 30;
    const isPort = (i === 0); // La primera isla es el Puerto

    const islandGroup = new THREE.Group();
    const geo = new THREE.CylinderGeometry(radius, radius + 10, 12, 16);
    const mat = new THREE.MeshLambertMaterial({ color: isPort ? 0xd4af37 : 0x2e7d32 });
    const islandMesh = new THREE.Mesh(geo, mat);
    islandMesh.position.set(ix, 2, iz);
    islandGroup.add(islandMesh);

    if (isPort) {
        // Faro / Casa de Puerto
        const portGeo = new THREE.BoxGeometry(12, 20, 12);
        const portMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const portBuilding = new THREE.Mesh(portGeo, portMat);
        portBuilding.position.set(ix, 15, iz);
        islandGroup.add(portBuilding);
    }

    scene.add(islandGroup);
    islands.push({ x: ix, z: iz, radius: radius + 12, isPort: isPort });
}

// Generar Enemigos y Monstruos
for (let i = 0; i < 5; i++) spawnEnemy(i === 4);

function spawnEnemy(isMonster = false) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 400;
    const ex = player.x + Math.cos(angle) * dist;
    const ez = player.z + Math.sin(angle) * dist;

    const mesh = createShipMesh(!isMonster, isMonster);
    mesh.position.set(ex, 0, ez);
    scene.add(mesh);

    enemies.push({
        mesh: mesh,
        x: ex,
        z: ez,
        hp: isMonster ? 3000 : 1500,
        maxHp: isMonster ? 3000 : 1500,
        damage: isMonster ? 150 : 80,
        isMonster: isMonster,
        radius: 14
    });
}

// --- MERCADO Y COMERCIO ---
function updateShopUI() {
    const container = document.getElementById('shop-items');
    const upgradeCost = player.cannonLevel * 100;
    container.innerHTML = `
        <div class="shop-item">
            <div>
                <h4>Mejorar Cañones (Nvl ${player.cannonLevel + 1})</h4>
                <p>Daño actual: ${player.damage} -> Nuevo: ${player.damage + 60}</p>
            </div>
            <button class="buy-btn" ${player.gold < upgradeCost ? 'disabled' : ''} onclick="buyUpgrade(${upgradeCost})">${upgradeCost} 🪙</button>
        </div>
        <div class="shop-item">
            <div>
                <h4>Reparar Galeón</h4>
                <p>Restaura HP al 100%</p>
            </div>
            <button class="buy-btn" ${player.gold < 50 ? 'disabled' : ''} onclick="repair(${50})">50 🪙</button>
        </div>
    `;
}

function toggleShop(show) {
    document.getElementById('shop-modal').style.display = show ? 'block' : 'none';
    if (show) updateShopUI();
}

function buyUpgrade(cost) {
    if (player.gold >= cost) {
        player.gold -= cost;
        player.cannonLevel++;
        player.damage += 60;
        updateUI();
        updateShopUI();
    }
}

function repair(cost) {
    if (player.gold >= cost) {
        player.gold -= cost;
        player.hp = player.maxHp;
        updateUI();
        updateShopUI();
    }
}

function updateUI() {
    document.getElementById('hp-display').innerText = `${player.hp}/${player.maxHp}`;
    document.getElementById('gold-display').innerText = player.gold;
    document.getElementById('cannon-level').innerText = `Nvl ${player.cannonLevel} (Daño: ${player.damage})`;
}

// --- CONTROLES TÁCTILES Y MOVIMIENTO ---
const leftZone = document.getElementById('left-zone');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');
const fireBtn = document.getElementById('fire-btn');

leftZone.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
    joyBase.style.left = `${touch.clientX}px`;
    joyBase.style.top = `${touch.clientY}px`;
    joyBase.style.display = 'block';
    player.targetX = null;
});

leftZone.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    const touch = e.touches[0];
    const dx = touch.clientX - joystick.startX;
    const dy = touch.clientY - joystick.startY;
    const dist = Math.min(Math.hypot(dx, dy), 40);
    const angle = Math.atan2(dy, dx);

    joystick.angle = angle;
    joystick.distance = dist / 40;
    joyStick.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
});

leftZone.addEventListener('touchend', () => {
    joystick.active = false;
    joystick.distance = 0;
    joyBase.style.display = 'none';
});

// Selección de Objetivo / Movimiento por Click o Toque
window.addEventListener('pointerdown', (e) => {
    if (e.clientY > window.innerHeight * 0.5 && e.clientX < window.innerWidth * 0.5) return;
    if (e.target.id === 'fire-btn' || e.target.closest('#shop-modal')) return;

    // Raycasting para detectar clics en 3D
    const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(scene.children, true);
    let targetEnemy = null;

    intersects.forEach(hit => {
        enemies.forEach(enemy => {
            if (enemy.mesh === hit.object || enemy.mesh.children.includes(hit.object)) {
                targetEnemy = enemy;
            }
        });
    });

    if (targetEnemy) {
        selectedEnemy = targetEnemy;
    } else {
        const oceanHit = raycaster.intersectObject(ocean);
        if (oceanHit.length > 0) {
            player.targetX = oceanHit[0].point.x;
            player.targetZ = oceanHit[0].point.z;
        }
    }

    if (inPortZone && e.target.id === 'port-tag') toggleShop(true);
});

fireBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    shootCannon(player, selectedEnemy);
});

// DISPARO UNITARGET 3D
function shootCannon(shooter, target) {
    if (shooter.fireCooldown > 0) return;
    if (!target) return;

    const dist = Math.hypot(target.x - shooter.x, target.z - shooter.z);
    if (dist > shooter.range) return;

    // Bola de Cañón 3D
    const geo = new THREE.SphereGeometry(2.5, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0x111111 });
    const ballMesh = new THREE.Mesh(geo, mat);
    ballMesh.position.set(shooter.x, 6, shooter.z);
    scene.add(ballMesh);

    cannonballs.push({
        mesh: ballMesh,
        startX: shooter.x,
        startZ: shooter.z,
        target: target,
        damage: shooter.damage,
        progress: 0,
        isPlayer: (shooter === player)
    });

    shooter.fireCooldown = 30;
}

// --- GAME LOOP & FÍSICAS DE COLISIÓN (SIN ATASCOS) ---
function update() {
    if (player.fireCooldown > 0) player.fireCooldown--;

    let moveX = 0;
    let moveZ = 0;

    if (joystick.active && joystick.distance > 0.1) {
        // Movimiento por Joystick
        moveX = Math.sin(joystick.angle + Math.PI / 4) * player.maxSpeed * joystick.distance;
        moveZ = Math.cos(joystick.angle + Math.PI / 4) * player.maxSpeed * joystick.distance;
        player.angle = Math.atan2(moveX, moveZ);
    } else if (player.targetX !== null) {
        // Movimiento a Destino
        const dx = player.targetX - player.x;
        const dz = player.targetZ - player.z;
        const dist = Math.hypot(dx, dz);

        if (dist > 5) {
            moveX = (dx / dist) * player.maxSpeed;
            moveZ = (dz / dist) * player.maxSpeed;
            player.angle = Math.atan2(moveX, moveZ);
        } else {
            player.targetX = null;
        }
    }

    // APLICAR MOVIMIENTO CON DESLIZAMIENTO EN ISLAS (Evita atascos)
    let nextX = player.x + moveX;
    let nextZ = player.z + moveZ;

    inPortZone = false;
    islands.forEach(island => {
        const dist = Math.hypot(nextX - island.x, nextZ - island.z);
        if (dist < island.radius + player.radius) {
            // Calcular vector de empuje para rebotar/deslizar suavemente por la orilla
            const pushAngle = Math.atan2(nextZ - island.z, nextX - island.x);
            nextX = island.x + Math.cos(pushAngle) * (island.radius + player.radius);
            nextZ = island.z + Math.sin(pushAngle) * (island.radius + player.radius);
        }

        if (island.isPort && dist < island.radius + 30) {
            inPortZone = true;
        }
    });

    document.getElementById('port-tag').style.display = inPortZone ? 'block' : 'none';

    player.x = nextX;
    player.z = nextZ;
    player.mesh.position.set(player.x, 0, player.z);
    player.mesh.rotation.y = player.angle;

    // La Cámara Isométrica sigue suavemente al Barco
    camera.position.x = player.x + 200;
    camera.position.z = player.z + 200;
    camera.lookAt(player.x, 0, player.z);

    // Mover Balas 3D en Parábola
    for (let i = cannonballs.length - 1; i >= 0; i--) {
        let b = cannonballs[i];
        b.progress += 0.04;

        if (b.progress >= 1) {
            // Impacto
            if (b.target) {
                b.target.hp -= b.damage;
                if (!b.isPlayer) {
                    player.hp = Math.max(0, player.hp - b.damage);
                    updateUI();
                }
            }
            scene.remove(b.mesh);
            cannonballs.splice(i, 1);
        } else {
            // Trayectoria curva 3D
            b.mesh.position.x = THREE.MathUtils.lerp(b.startX, b.target.x, b.progress);
            b.mesh.position.z = THREE.MathUtils.lerp(b.startZ, b.target.z, b.progress);
            b.mesh.position.y = Math.sin(b.progress * Math.PI) * 20 + 4;
        }
    }

    // IA Enemigos
    enemies.forEach((e, index) => {
        const dist = Math.hypot(player.x - e.x, player.z - e.z);

        if (dist < 220) {
            e.angle = Math.atan2(player.x - e.x, player.z - e.z);
            e.mesh.rotation.y = e.angle;

            if (dist > 90) {
                e.x += Math.sin(e.angle) * 0.8;
                e.z += Math.cos(e.angle) * 0.8;
                e.mesh.position.set(e.x, 0, e.z);
            } else {
                shootCannon(e, player);
            }
        }

        // Muerte de enemigo
        if (e.hp <= 0) {
            scene.remove(e.mesh);
            player.gold += e.isMonster ? 150 : 50;
            updateUI();
            if (selectedEnemy === e) selectedEnemy = null;
            enemies.splice(index, 1);
            setTimeout(() => spawnEnemy(Math.random() > 0.7), 5000);
        }
    });
}

function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
