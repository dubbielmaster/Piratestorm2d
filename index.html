<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - Puerto & Cañones</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b2236;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* UI HUD */
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(15, 23, 42, 0.88);
            border: 2px solid #b8860b;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f3e5ab;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            pointer-events: none;
        }
        .hud div { margin-bottom: 3px; }

        .port-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(212, 175, 55, 0.9);
            color: #111;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            display: none;
            box-shadow: 0 0 10px #ffd700;
        }

        /* Modal del Mercado / Puerto */
        #shop-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 88%;
            max-width: 400px;
            background: #111827;
            border: 3px solid #ffd700;
            border-radius: 12px;
            padding: 18px;
            color: #fff;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 100;
        }
        #shop-modal h2 {
            margin-top: 0;
            color: #ffd700;
            text-align: center;
            font-size: 20px;
            border-bottom: 1px solid #374151;
            padding-bottom: 8px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2937;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #374151;
        }
        .shop-item h4 { margin: 0 0 4px 0; color: #facc15; font-size: 14px; }
        .shop-item p { margin: 0; font-size: 11px; color: #9ca3af; }
        .buy-btn {
            background: #10b981;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
        .buy-btn:disabled {
            background: #4b5563;
            opacity: 0.6;
        }
        #close-shop {
            width: 100%;
            background: #ef4444;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Controles */
        .control-zone {
            position: absolute;
            bottom: 0;
            width: 50%;
            height: 50%;
        }
        #left-zone { left: 0; }
        #right-zone { right: 0; }

        #joystick-base {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.6);
            display: none;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #joystick-stick {
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: radial-gradient(circle, #ffd700, #b8860b);
            top: 27.5px;
            left: 27.5px;
        }

        #fire-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: radial-gradient(circle, #e63946, #800000);
            border: 3px solid #ffd700;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI -->
    <div class="hud">
        <div>🚢 Barco: <span id="ship-name" style="color: #60a5fa;">Canoa Pirata</span></div>
        <div>❤️ Salud: <span id="hp-display" style="color: #4ade80;">100/100</span></div>
        <div>🪙 Oro: <span id="gold-display" style="color: #facc15;">0</span></div>
        <div>⚔️ Nivel Cañones: <span id="cannon-level" style="color: #f97316;">Nvl 1</span></div>
    </div>

    <div id="port-tag" class="port-indicator">⚓ Cerca de Puerto (Toca Mercado)</div>

    <!-- Tienda / Mercado -->
    <div id="shop-modal">
        <h2>⚓ Mercado de Puerto Pirata</h2>
        <div id="shop-items"></div>
        <button id="close-shop" onclick="toggleShop(false)">CERRAR MERCADO</button>
    </div>

    <!-- Controles -->
    <div id="left-zone" class="control-zone"></div>
    <div id="right-zone" class="control-zone">
        <div id="fire-btn">ATACAR</div>
    </div>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- MODELOS DE BARCOS COMERCIABLES ---
const SHIPS_CATALOG = [
    { id: 'boat_1', name: 'Sloop Ligero', price: 100, maxHp: 180, speed: 3.2, color: '#2a9d8f' },
    { id: 'boat_2', name: 'Bergantín de Caza', price: 250, maxHp: 320, speed: 3.5, color: '#3b82f6' },
    { id: 'boat_3', name: 'Galeón de Guerra', price: 500, maxHp: 600, speed: 3.0, color: '#8b5cf6' }
];

// --- JUGADOR Y ESTADO ---
let player = {
    x: 1000,
    y: 1000,
    targetX: null,
    targetY: null,
    angle: 0,
    speed: 0,
    maxSpeed: 2.8,
    hp: 100,
    maxHp: 100,
    gold: 50, // Oro inicial para probar
    cannonLevel: 1,
    cannonDamage: 18,
    shipName: 'Canoa Pirata',
    shipColor: '#2a9d8f',
    fireCooldown: 0,
    range: 350
};

let selectedEnemy = null;
let enemies = [];
let cannonballs = [];
let particles = [];
let damageTexts = [];
let lootChests = [];
let islands = [];
let ports = [];
let inPortZone = false;

let joystick = { active: false, startX: 0, startY: 0, currentX: 0, currentY: 0, angle: 0, distance: 0 };
let waveOffset = 0;

// Crear Mapa e Islas con Puertos
for (let i = 0; i < 10; i++) {
    let ix = Math.random() * 2600 - 300;
    let iy = Math.random() * 2600 - 300;
    let isPort = (i < 2); // 2 de las islas tienen un puerto comercial

    islands.push({ x: ix, y: iy, radius: 50 + Math.random() * 40, isPort });
    if (isPort) {
        ports.push({ x: ix, y: iy, radius: 120 });
    }
}

for (let i = 0; i < 6; i++) spawnEnemy();

function spawnEnemy() {
    const angle = Math.random() * Math.PI * 2;
    const dist = 450 + Math.random() * 500;
    enemies.push({
        id: Math.random(),
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist,
        angle: Math.random() * Math.PI * 2,
        hp: 70,
        maxHp: 70,
        speed: 1.6,
        fireCooldown: 0,
        range: 260
    });
}

// --- MERCADO Y COMPRAS ---
function updateShopUI() {
    const container = document.getElementById('shop-items');
    container.innerHTML = '';

    // Opción 1: Mejorar Cañones
    const cannonPrice = player.cannonLevel * 75;
    container.innerHTML += `
        <div class="shop-item">
            <div>
                <h4>Mejorar Cañones (Nvl ${player.cannonLevel + 1})</h4>
                <p>Aumenta el daño a +${player.cannonDamage + 8}</p>
            </div>
            <button class="buy-btn" ${player.gold < cannonPrice ? 'disabled' : ''} onclick="buyCannonUpgrade(${cannonPrice})">
                ${cannonPrice} 🪙
            </button>
        </div>
    `;

    // Opción 2: Reparar Barco
    const repairPrice = Math.floor((player.maxHp - player.hp) * 0.5);
    if (repairPrice > 0) {
        container.innerHTML += `
            <div class="shop-item">
                <div>
                    <h4>Reparar Casco</h4>
                    <p>Restaura salud al máximo</p>
                </div>
                <button class="buy-btn" ${player.gold < repairPrice ? 'disabled' : ''} onclick="repairShip(${repairPrice})">
                    ${repairPrice} 🪙
                </button>
            </div>
        `;
    }

    // Comprar Barcos
    SHIPS_CATALOG.forEach(ship => {
        container.innerHTML += `
            <div class="shop-item">
                <div>
                    <h4>${ship.name}</h4>
                    <p>Salud: ${ship.maxHp} HP | Vel: ${ship.speed}</p>
                </div>
                <button class="buy-btn" ${player.gold < ship.price ? 'disabled' : ''} onclick="buyShip('${ship.id}')">
                    ${ship.price} 🪙
                </button>
            </div>
        `;
    });
}

function toggleShop(show) {
    document.getElementById('shop-modal').style.display = show ? 'block' : 'none';
    if (show) updateShopUI();
}

function buyCannonUpgrade(cost) {
    if (player.gold >= cost) {
        player.gold -= cost;
        player.cannonLevel++;
        player.cannonDamage += 8;
        updateUI();
        updateShopUI();
    }
}

function repairShip(cost) {
    if (player.gold >= cost) {
        player.gold -= cost;
        player.hp = player.maxHp;
        updateUI();
        updateShopUI();
    }
}

function buyShip(shipId) {
    const ship = SHIPS_CATALOG.find(s => s.id === shipId);
    if (ship && player.gold >= ship.price) {
        player.gold -= ship.price;
        player.shipName = ship.name;
        player.maxHp = ship.maxHp;
        player.hp = ship.maxHp;
        player.maxSpeed = ship.speed;
        player.shipColor = ship.color;
        updateUI();
        updateShopUI();
    }
}

function updateUI() {
    document.getElementById('ship-name').innerText = player.shipName;
    document.getElementById('hp-display').innerText = `${player.hp}/${player.maxHp}`;
    document.getElementById('gold-display').innerText = player.gold;
    document.getElementById('cannon-level').innerText = `Nvl ${player.cannonLevel}`;
}

// --- CONTROLES Y DISPARO UNITARGET ---
const leftZone = document.getElementById('left-zone');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');
const fireBtn = document.getElementById('fire-btn');

leftZone.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    joystick.active = true;
    joystick.startX = touch.clientX;
    joystick.startY = touch.clientY;
    joystick.currentX = touch.clientX;
    joystick.currentY = touch.clientY;

    joyBase.style.left = `${touch.clientX}px`;
    joyBase.style.top = `${touch.clientY}px`;
    joyBase.style.display = 'block';
    player.targetX = null;
});

leftZone.addEventListener('touchmove', (e) => {
    if (!joystick.active) return;
    const touch = e.touches[0];
    const dx = touch.clientX - joystick.startX;
    const dy = touch.clientY - joystick.startY;
    const dist = Math.min(Math.hypot(dx, dy), 40);
    const angle = Math.atan2(dy, dx);

    joystick.angle = angle;
    joystick.distance = dist / 40;
    joyStick.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
});

const endJoystick = () => {
    joystick.active = false;
    joystick.distance = 0;
    joyBase.style.display = 'none';
};
leftZone.addEventListener('touchend', endJoystick);

window.addEventListener('click', (e) => {
    if (e.clientY > window.innerHeight * 0.5 && e.clientX < window.innerWidth * 0.5) return;
    if (e.target.id === 'fire-btn' || e.target.closest('#shop-modal')) return;

    const worldX = e.clientX - canvas.width / 2 + player.x;
    const worldY = e.clientY - canvas.height / 2 + player.y;

    // Abrir puerto al tocarlo si estás dentro del área
    if (inPortZone) {
        let clickedPort = ports.some(p => Math.hypot(p.x - worldX, p.y - worldY) < 80);
        if (clickedPort) {
            toggleShop(true);
            return;
        }
    }

    // Seleccionar Enemigo
    let clickedEnemy = enemies.find(e => Math.hypot(e.x - worldX, e.y - worldY) < 35);

    if (clickedEnemy) {
        selectedEnemy = clickedEnemy;
    } else {
        player.targetX = worldX;
        player.targetY = worldY;
    }
});

fireBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    shootSingleTarget(player, selectedEnemy);
});

// SISTEMA DE DISPARO UNITARGET DIRECTO AL OBJETIVO
function shootSingleTarget(ship, target) {
    if (ship.fireCooldown > 0) return;
    if (!target) {
        showDamageText(ship.x, ship.y - 30, '¡Selecciona Objetivo!', '#facc15');
        return;
    }

    const dist = Math.hypot(target.x - ship.x, target.y - ship.y);
    if (dist > ship.range) {
        showDamageText(ship.x, ship.y - 30, '¡Fuera de alcance!', '#f87171');
        return;
    }

    // Lanzar ráfaga de balas dirigidas
    const angle = Math.atan2(target.y - ship.y, target.x - ship.x);
    for (let i = 0; i < 3; i++) {
        setTimeout(() => {
            cannonballs.push({
                x: ship.x,
                y: ship.y,
                target: target,
                damage: ship.cannonDamage || 15,
                speed: 8,
                isPlayer: (ship === player)
            });
        }, i * 90);
    }

    createParticles(ship.x, ship.y, '#aaa', 4);
    ship.fireCooldown = 28;
}

function showDamageText(x, y, text, color = '#f87171') {
    damageTexts.push({ x, y, text, color, alpha: 1, vy: -1 });
}

// --- UPDATE ---
function update() {
    waveOffset += 0.03;
    if (player.fireCooldown > 0) player.fireCooldown--;

    // Movimiento
    if (joystick.active && joystick.distance > 0.1) {
        player.angle = joystick.angle;
        player.speed = player.maxSpeed * joystick.distance;
    } else if (player.targetX !== null && player.targetY !== null) {
        const dx = player.targetX - player.x;
        const dy = player.targetY - player.y;
        const dist = Math.hypot(dx, dy);

        if (dist > 10) {
            player.angle = Math.atan2(dy, dx);
            player.speed = player.maxSpeed;
        } else {
            player.speed = 0;
            player.targetX = null;
            player.targetY = null;
        }
    } else {
        player.speed *= 0.92;
    }

    player.x += Math.cos(player.angle) * player.speed;
    player.y += Math.sin(player.angle) * player.speed;

    // Verificar Zona de Puerto
    inPortZone = ports.some(p => Math.hypot(player.x - p.x, player.y - p.y) < p.radius);
    document.getElementById('port-tag').style.display = inPortZone ? 'block' : 'none';

    // Recoger Cofres
    for (let i = lootChests.length - 1; i >= 0; i--) {
        let chest = lootChests[i];
        if (Math.hypot(player.x - chest.x, player.y - chest.y) < 30) {
            player.gold += chest.gold;
            showDamageText(player.x, player.y - 20, `+${chest.gold} Oro`, '#facc15');
            updateUI();
            lootChests.splice(i, 1);
        }
    }

    // Actualizar Balas Guiadas (Unitarget)
    for (let i = cannonballs.length - 1; i >= 0; i--) {
        let b = cannonballs[i];
        
        if (b.target && b.target.hp > 0) {
            const angle = Math.atan2(b.target.y - b.y, b.target.x - b.x);
            b.x += Math.cos(angle) * b.speed;
            b.y += Math.sin(angle) * b.speed;

            // Impacto
            if (Math.hypot(b.target.x - b.x, b.target.y - b.y) < 15) {
                b.target.hp -= b.damage;
                createParticles(b.x, b.y, '#ff8c00', 6);
                showDamageText(b.target.x, b.target.y, `-${b.damage}`);
                if (!b.isPlayer) updateUI();
                cannonballs.splice(i, 1);
            }
        } else {
            cannonballs.splice(i, 1);
        }
    }

    // IA Enemigos
    enemies.forEach((e, index) => {
        if (e.fireCooldown > 0) e.fireCooldown--;

        const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
        if (distToPlayer < 300) {
            e.angle = Math.atan2(player.y - e.y, player.x - e.x);
            if (distToPlayer > 130) {
                e.x += Math.cos(e.angle) * e.speed;
                e.y += Math.sin(e.angle) * e.speed;
            } else {
                shootSingleTarget(e, player);
            }
        }

        if (e.hp <= 0) {
            createParticles(e.x, e.y, '#e63946', 18);
            lootChests.push({ x: e.x, y: e.y, gold: 25 + Math.floor(Math.random() * 25) });
            if (selectedEnemy === e) selectedEnemy = null;
            enemies.splice(index, 1);
            setTimeout(spawnEnemy, 4000);
        }
    });

    // Partículas y Texto
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
    for (let i = damageTexts.length - 1; i >= 0; i--) {
        let dt = damageTexts[i];
        dt.y += dt.vy; dt.alpha -= 0.02;
        if (dt.alpha <= 0) damageTexts.splice(i, 1);
    }
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            alpha: 1, color: color
        });
    }
}

// --- RENDERIZADO 2D ---
function render() {
    ctx.fillStyle = '#0f385d';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width / 2 - player.x, canvas.height / 2 - player.y);

    // Olas
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.07)';
    ctx.lineWidth = 2;
    for (let x = player.x - canvas.width; x < player.x + canvas.width; x += 120) {
        for (let y = player.y - canvas.height; y < player.y + canvas.height; y += 120) {
            ctx.beginPath();
            ctx.arc(x + Math.sin(waveOffset + y) * 8, y + Math.cos(waveOffset + x) * 8, 12, 0, Math.PI);
            ctx.stroke();
        }
    }

    // Islas y Puertos
    islands.forEach(island => {
        ctx.fillStyle = island.isPort ? '#eab308' : '#c2a649';
        ctx.beginPath();
        ctx.arc(island.x, island.y, island.radius + 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = island.isPort ? '#15803d' : '#2d6a4f';
        ctx.beginPath();
        ctx.arc(island.x, island.y, island.radius, 0, Math.PI * 2);
        ctx.fill();

        // Bandera de Puerto Comercial
        if (island.isPort) {
            ctx.fillStyle = '#ef4444';
            ctx.fillRect(island.x - 5, island.y - 15, 12, 8);
            ctx.fillStyle = '#fff';
            ctx.fillRect(island.x - 5, island.y - 15, 2, 20);
        }
    });

    // Cofres
    lootChests.forEach(c => {
        ctx.fillStyle = '#b8860b';
        ctx.fillRect(c.x - 7, c.y - 5, 14, 10);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(c.x - 2, c.y - 2, 4, 4);
    });

    // Partículas
    particles.forEach(p => {
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Balas
    ctx.fillStyle = '#111';
    cannonballs.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    // Enemigos
    enemies.forEach(e => drawShip(e.x, e.y, e.angle, '#e63946', e.hp, e.maxHp, (e === selectedEnemy)));

    // Jugador
    drawShip(player.x, player.y, player.angle, player.shipColor, player.hp, player.maxHp, false);

    // Textos de Daño
    damageTexts.forEach(dt => {
        ctx.globalAlpha = dt.alpha;
        ctx.fillStyle = dt.color;
        ctx.font = 'bold 14px Arial';
        ctx.fillText(dt.text, dt.x - 10, dt.y);
    });
    ctx.globalAlpha = 1;

    ctx.restore();
}

function drawShip(x, y, angle, hullColor, hp, maxHp, isSelected) {
    ctx.save();
    ctx.translate(x, y);

    if (isSelected) {
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.arc(0, 0, 30, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    ctx.rotate(angle);

    // Casco
    ctx.fillStyle = hullColor;
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.quadraticCurveTo(0, 11, -15, 9);
    ctx.lineTo(-18, 0);
    ctx.quadraticCurveTo(0, -11, 20, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Velas
    ctx.fillStyle = '#fff';
    ctx.fillRect(-5, -10, 4, 20);

    ctx.restore();

    // Barra de Vida
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(x - 18, y - 26, 36, 5);
    ctx.fillStyle = (hp / maxHp) > 0.4 ? '#4ade80' : '#ef4444';
    ctx.fillRect(x - 18, y - 26, (hp / maxHp) * 36, 5);
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
