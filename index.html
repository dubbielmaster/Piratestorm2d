<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pirate Storm Mobile - v0.02</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #ffffff; font-family: Arial, sans-serif; pointer-events: none; }
        #version { font-size: 12px; color: #ffd700; font-weight: bold; text-transform: uppercase; }
        #stats { font-size: 14px; margin-top: 5px; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="version">v0.02 - Cañones y Enemigos</div>
        <div id="stats">Toca para moverte y disparar a los enemigos</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // =============================================================
        // CONFIGURACIÓN DE CAÑONES Y ARMAMENTO (Ajustable)
        // =============================================================
        const CANNON_CONFIG = {
            damage: 25,          // Daño por bala
            range: 350,          // Alcance máximo en píxeles
            fireRate: 400,       // Tiempo de recarga en milisegundos
            bulletSpeed: 7,      // Velocidad de la bala
            cannonsCount: 2      // Número de cañones por disparo
        };

        // =============================================================
        // 1. CLASE OCÉANO (OLEAJE MEJORADO)
        // =============================================================
        class Ocean {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.time = 0;
            }

            update() {
                this.time += 0.005;
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                const gradient = ctx.createLinearGradient(0, 0, 0, h);
                gradient.addColorStop(0, "#00c3e3");
                gradient.addColorStop(1, "#0084a8");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.lineWidth = 1;

                const layers = [
                    { freqX: 0.01, freqY: 0.01, speed: 1.0, opacity: 0.15, scaleY: 15 },
                    { freqX: 0.02, freqY: 0.005, speed: -0.8, opacity: 0.10, scaleY: 10 }
                ];

                layers.forEach(layer => {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${layer.opacity})`;
                    for (let yBase = -50; yBase < h + 50; yBase += 15) {
                        ctx.beginPath();
                        for (let x = 0; x < w + 20; x += 10) {
                            const movement = this.time * layer.speed;
                            const waveX = Math.sin(x * layer.freqX + movement);
                            const waveY = Math.cos((yBase + x*0.1) * layer.freqY + movement * 0.5);
                            const yOutput = yBase + (waveX * waveY) * layer.scaleY;

                            if (x === 0) ctx.moveTo(x, yOutput);
                            else ctx.lineTo(x, yOutput);
                        }
                        ctx.stroke();
                    }
                });

                ctx.restore();
            }
        }

        // =============================================================
        // 2. CLASE BALA DE CAÑÓN
        // =============================================================
        class CannonBall {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.startX = startX;
                this.startY = startY;
                
                const angle = Math.atan2(targetY - startY, targetX - startX);
                this.vx = Math.cos(angle) * CANNON_CONFIG.bulletSpeed;
                this.vy = Math.sin(angle) * CANNON_CONFIG.bulletSpeed;
                this.active = true;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Destruir bala si supera el alcance
                const dist = Math.hypot(this.x - this.startX, this.y - this.startY);
                if (dist > CANNON_CONFIG.range) {
                    this.active = false;
                }
            }

            draw(ctx) {
                ctx.fillStyle = "#111111";
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // =============================================================
        // 3. CLASE ENEMIGO (Monstruo / Barco Pirata)
        // =============================================================
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.maxHp = 100;
                this.hp = 100;
                this.radius = 20;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.8;
            }

            update() {
                // Movimiento errático en el agua
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                if (Math.random() < 0.02) {
                    this.angle += (Math.random() - 0.5);
                }
            }

            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0) {
                    this.hp = 0;
                    this.respawn();
                }
            }

            respawn() {
                // Aparecer en una nueva posición
                this.x = Math.random() * (window.innerWidth - 100) + 50;
                this.y = Math.random() * (window.innerHeight - 100) + 50;
                this.hp = this.maxHp;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                // Monstruo/Barco Enemigo (Rojo)
                ctx.fillStyle = "#8b0000";
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = "#ff4500";
                ctx.beginPath();
                ctx.arc(0, 0, this.radius - 5, 0, Math.PI * 2);
                ctx.fill();

                // Barra de Vida
                const barWidth = 30;
                const barHeight = 4;
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(-barWidth/2, -this.radius - 10, barWidth, barHeight);

                ctx.fillStyle = "#00ff00";
                ctx.fillRect(-barWidth/2, -this.radius - 10, (this.hp / this.maxHp) * barWidth, barHeight);

                ctx.restore();
            }
        }

        // =============================================================
        // 4. CLASE JUGADOR CON CAÑONES
        // =============================================================
        class PlayerShip {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.speed = 2.0;
                this.angle = 0;
                this.lastShot = 0;
            }

            moveTo(targetX, targetY) {
                this.targetX = targetX;
                this.targetY = targetY;
            }

            shoot(targetX, targetY, bulletsArray) {
                const now = Date.now();
                if (now - this.lastShot >= CANNON_CONFIG.fireRate) {
                    // Disparar proyectil
                    bulletsArray.push(new CannonBall(this.x, this.y, targetX, targetY));
                    this.lastShot = now;
                }
            }

            update() {
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.hypot(dx, dy);

                if (distance > 5) {
                    this.angle = Math.atan2(dy, dx);
                    this.x += Math.cos(this.angle) * this.speed;
                    this.y += Math.sin(this.angle) * this.speed;
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Casco del barco
                ctx.fillStyle = "#5c3d11";
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-15, -10);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, 10);
                ctx.closePath();
                ctx.fill();

                // Cañones laterales (Detalle visual)
                ctx.fillStyle = "#222222";
                ctx.fillRect(-2, -12, 4, 3);
                ctx.fillRect(-2, 9, 4, 3);

                // Velas
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(-5, -8, 4, 16);

                ctx.restore();
            }
        }

        // =============================================================
        // 5. INICIALIZACIÓN Y BUCLE PRINCIPAL
        // =============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const ocean = new Ocean(canvas);
        const player = new PlayerShip(canvas.width / 2, canvas.height / 2);
        const bullets = [];
        const enemies = [
            new Enemy(100, 150),
            new Enemy(canvas.width - 100, 200)
        ];

        // Controles Táctiles
        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            const touchY = touch.clientY - rect.top;

            player.moveTo(touchX, touchY);
            player.shoot(touchX, touchY, bullets);
        }

        canvas.addEventListener('touchstart', handleTouch, {passive: false});
        canvas.addEventListener('touchmove', handleTouch, {passive: false});

        // Bucle del juego
        function gameLoop() {
            ocean.update();
            player.update();

            // Actualizar Enemigos
            enemies.forEach(enemy => enemy.update());

            // Actualizar y Colisiones de Balas
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.update();

                // Colisión con enemigos
                enemies.forEach(enemy => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist < enemy.radius) {
                        enemy.takeDamage(CANNON_CONFIG.damage);
                        bullet.active = false;
                    }
                });

                if (!bullet.active) {
                    bullets.splice(i, 1);
                }
            }

            // Renderizado
            ocean.draw();
            enemies.forEach(enemy => enemy.draw(ctx));
            bullets.forEach(bullet => bullet.draw(ctx));
            player.draw(ctx);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
